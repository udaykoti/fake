services:
  - type: web
    name: fake-job-detector-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DISTILBERT_MODEL_DIR
        value: ""
      - key: LOGREG_MODEL_PATH
        value: ""
